{% extends "base.html" %}

        <table class="transaction-table">

                    <td class="tag tag--income">Income</td>
                </tr>
                <tr>
                    <td>$320</td>
                    <td>Utilities</td>
                    <td class="tag tag--expense">Expense</td>
                </tr>
                <tr>
                    <td>$760</td>

                    <td class="tag tag--income">Income</td>
                </tr>
            </tbody>
        </table>
